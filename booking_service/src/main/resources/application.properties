# ============================================
# Booking Service Configuration
# ============================================

server.port=8081

spring.application.name=booking-service

# ============================================
# DataSource - MySQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================
# External Services
# ============================================
# Patient Service base URL (running on port 8080)
patient.service.url=http://localhost:8080

# Doctor Service base URL (mock — not yet deployed)
doctor.service.url=http://localhost:8082
