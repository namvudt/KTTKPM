# ============================================
# API Gateway - Kubernetes Profile
# Overrides route URIs to use K8s service names
# ============================================

# Route: Patient Service
spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=http://patient-service-svc:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/patients/**

# Route: Booking Service
spring.cloud.gateway.routes[1].id=booking-service
spring.cloud.gateway.routes[1].uri=http://booking-service-svc:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/tickets/**

# Route: Doctor Service — doctors
spring.cloud.gateway.routes[2].id=doctor-service
spring.cloud.gateway.routes[2].uri=http://doctor-service-svc:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/doctors/**

# Route: Doctor Service — timeslots
spring.cloud.gateway.routes[3].id=timeslot-service
spring.cloud.gateway.routes[3].uri=http://doctor-service-svc:8082
spring.cloud.gateway.routes[3].predicates[0]=Path=/timeslots/**

# CORS — allow all origins in K8s (frontend nginx proxies internally)
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=false
