server.port=9000

spring.application.name=api-gateway

# ═══════════════════════════════════════════════════════════════
# Route: Patient Service (port 8080)
# /patients/** → http://localhost:8080/patients/**
# ═══════════════════════════════════════════════════════════════
spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=http://localhost:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/patients/**

# ═══════════════════════════════════════════════════════════════
# Route: Booking Service (port 8081)
# /tickets/** → http://localhost:8081/tickets/**
# ═══════════════════════════════════════════════════════════════
spring.cloud.gateway.routes[1].id=booking-service
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/tickets/**

# ═══════════════════════════════════════════════════════════════
# Route: Doctor Service (port 8082) — doctors
# /doctors/** → http://localhost:8082/doctors/**
# ═══════════════════════════════════════════════════════════════
spring.cloud.gateway.routes[2].id=doctor-service
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/doctors/**

# ═══════════════════════════════════════════════════════════════
# Route: Doctor Service (port 8082) — timeslots
# /timeslots/** → http://localhost:8082/timeslots/**
# ═══════════════════════════════════════════════════════════════
spring.cloud.gateway.routes[3].id=timeslot-service
spring.cloud.gateway.routes[3].uri=http://localhost:8082
spring.cloud.gateway.routes[3].predicates[0]=Path=/timeslots/**

# ═══════════════════════════════════════════════════════════════
# CORS — allow frontend (port 3000) to call gateway
# ═══════════════════════════════════════════════════════════════
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level - %msg%n
