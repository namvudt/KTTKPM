version: '3.8'

services:
  # Cấu hình cho Database MySQL
  mysql-db:
    image: mysql:8.0
    container_name: patient_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: patient_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  # Cấu hình cho ứng dụng Spring Boot
  patient-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: patient_service_app
    ports:
      - "8080:8080"
    environment:
      # Ghi đè cấu hình URL để trỏ tới service mysql-db thay vì localhost
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/patient_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
    depends_on:
      - mysql-db
    restart: always

volumes:
  mysql_data:
